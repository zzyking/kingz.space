# -- Markup --
# These settings are required for the theme to function.

[goldmark]
[goldmark.extensions.passthrough]
  enable = true

[goldmark.extensions.passthrough.delimiters]
  block = [['\[', '\]'], ['$$', '$$']]
  inline = [['\(', '\)']]

[goldmark.renderer]
  unsafe = true

[highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = false

[tableOfContents]
  startLevel = 2
  endLevel = 4
